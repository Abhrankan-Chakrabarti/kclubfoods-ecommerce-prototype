<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K-Club Foods</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <h1>K-Club Foods</h1>
  <nav>
    <a href="#products">Products</a>
    <a href="#cart">Cart (<span id="cart-count">0</span>)</a>
  </nav>
</header>

<section class="hero">
  <h2>🔥 Spice Up Every Bite</h2>
  <p>Premium chilli garlic oil & healthy dry fruit mixes</p>
</section>

<section id="products" class="products">
  <h2>Our Products</h2>

  <div class="product">
    <img src="https://m.media-amazon.com/images/I/61gDGmHufzL._AC_UF894,1000_QL80_FMwebp_.jpg"/>
    <h3>Chilli Garlic Oil</h3>
    <p>Bold, spicy, garlic-rich flavor</p>
    <p class="price">₹298</p>
    <button onclick="addToCart('Chilli Garlic Oil', 298)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://m.media-amazon.com/images/I/610iGr8NnJL._AC_UF894,1000_QL80_FMwebp_.jpg"/>
    <h3>Dry Fruit Mix</h3>
    <p>Roasted in pink salt & olive oil</p>
    <p class="price">₹549</p>
    <button onclick="addToCart('Dry Fruit Mix', 549)">Add to Cart</button>
  </div>

</section>

<section id="cart" class="cart">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <p id="total">Total: ₹0</p>
  <button onclick="checkout()">Checkout</button>
</section>

<footer>
  <p>© 2026 K-Club Foods</p>
</footer>

<script src="script.js"></script>
</body>
</html>
